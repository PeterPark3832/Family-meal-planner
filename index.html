    const getMinAge = (members) => {
      const kids = members.filter(m => m.type === 'child');
      return kids.length ? Math.min(...kids.map(m => parseInt(m.age) || 0)) : 99;
    };

    const hasKids = (members) => members.some(m => m.type === 'child');

    const getPool = (mealType, cuisines, minAge, noSpicy = false, customMeals = [], ratings = {}, allergens = []) => {
      const all = [...MEALS, ...customMeals];
      return all.filter(m =>
        (m.isUserCustom || cuisines.includes(m.cuisine)) &&
        m.types.includes(mealType) &&
        m.minAge <= minAge &&
        (!noSpicy || !m.spicy) &&
        ((ratings[m.name]?.likes || 0) - (ratings[m.name]?.dislikes || 0)) > -2 &&
        (allergens.length === 0 || !(MEAL_ALLERGENS[m.name] || []).some(a => allergens.includes(a)))
      );
    };

    const shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    const ratedShuffle = (arr, ratings = {}) =>
      arr
        .map(m => {
          const r = ratings[m.name] || { likes:0, dislikes:0 };
          const score = r.likes - r.dislikes;
          const weight = score >= 2 ? 3 : score === 1 ? 2 : score === -1 ? 0.5 : 1;
          return { m, priority: Math.random() * weight };
        })
        .sort((a, b) => b.priority - a.priority)
        .map(x => x.m);

    function generatePlan(period, cuisines, minAge, noSpicy = false, childrenPresent = false, customMeals = [], ratings = {}, allergens = []) {
      const plan = {};
      for (let d = 0; d < period; d++) {
        plan[d] = {};
        const lookback = Math.max(0, d - 10);

        for (const mt of ['breakfast','lunch','dinner']) {
          if (childrenPresent) {
            const adultPool = getPool(mt, cuisines, 99, noSpicy, customMeals, ratings, allergens);
            const childNoSpicy = minAge <= 6 || noSpicy;
            const childPool = getPool(mt, cuisines, minAge, childNoSpicy, customMeals, ratings, allergens);

            const usedAdult = new Set(), usedChild = new Set();
            for (let wd = lookback; wd < d; wd++) {
              if (plan[wd]?.[mt]?.adult?.name) usedAdult.add(plan[wd][mt].adult.name);
              if (plan[wd]?.[mt]?.child?.name) usedChild.add(plan[wd][mt].child.name);
            }

            const freshAdult = adultPool.filter(m => !usedAdult.has(m.name));
            const chosenAdult = ratedShuffle(freshAdult.length ? freshAdult : adultPool, ratings)[0]
              || { name:'직접 입력', cuisine:'custom' };

            const childExcludes = new Set([...usedChild, chosenAdult.name]);
            const freshChildDiff = childPool.filter(m => !childExcludes.has(m.name));
            const freshChild     = childPool.filter(m => !usedChild.has(m.name));
            const chosenChild = ratedShuffle(
              freshChildDiff.length ? freshChildDiff : (freshChild.length ? freshChild : childPool), ratings
            )[0] || { name:'직접 입력', cuisine:'custom' };

            plan[d][mt] = {
              adult: { name: chosenAdult.name, cuisine: chosenAdult.cuisine },
              child: { name: chosenChild.name, cuisine: chosenChild.cuisine },
            };
          } else {
            const pool = getPool(mt, cuisines, minAge, noSpicy, customMeals, ratings, allergens);
            if (!pool.length) { plan[d][mt] = { name:'직접 입력', cuisine:'custom' }; continue; }
            const used = new Set();
            for (let wd = lookback; wd < d; wd++) {
              if (plan[wd]?.[mt]?.name) used.add(plan[wd][mt].name);
            }
            const fresh = pool.filter(m => !used.has(m.name));
            const chosen = ratedShuffle(fresh.length ? fresh : pool, ratings)[0];
            plan[d][mt] = { name: chosen.name, cuisine: chosen.cuisine };
          }
        }
      }
      return plan;
    }

    function pickOneMeal(mealType, cuisines, minAge, excludeName, noSpicy = false, customMeals = [], ratings = {}, allergens = []) {
      const pool = getPool(mealType, cuisines, minAge, noSpicy, customMeals, ratings, allergens).filter(m => m.name !== excludeName);
      if (!pool.length) return null;
      return ratedShuffle(pool, ratings)[0];
    }

              <div className="flex gap-0.5 mt-0.5">
                <button onClick={e => { e.stopPropagation(); onRecipe?.(meal.name, meal.cuisine); }}
                  className="flex-1 h-5 bg-white border border-gray-200 rounded text-[9px] flex items-center justify-center hover:bg-red-50 active:bg-red-100">📺</button>
                <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'like'); }}
                  className={`flex-1 h-5 bg-white border rounded text-[9px] flex items-center justify-center active:bg-green-100 ${score > 0 ? 'border-green-300 bg-green-50' : 'border-gray-200'}`}>👍</button>
                <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'dislike'); }}
                  className={`flex-1 h-5 bg-white border rounded text-[9px] flex items-center justify-center active:bg-red-100 ${score < 0 ? 'border-red-300 bg-red-50' : 'border-gray-200'}`}>👎</button>
              </div>
            )}
          </div>
        );
      }

      // ── 데스크탑 레이아웃: 호버 오버레이 버튼 ──
      return (
        <div className="relative">
          <div onClick={onClick}
            className={`meal-card cursor-pointer border rounded-lg p-1.5 transition-all hover:shadow-sm ${
              meal?.name
                ? `${info.border} ${info.bg}${score >= 2 ? ' ring-1 ring-green-300' : score <= -1 ? ' ring-1 ring-red-200' : ''}`
                : 'border-dashed border-gray-200 hover:border-orange-300 hover:bg-orange-50'
            }`}>
            <div className="flex items-center gap-1">
              <span className="text-[10px] flex-shrink-0">{icon}</span>
              <span className="text-[11px] font-semibold text-gray-800 leading-tight truncate flex-1">
                {meal?.name || <span className="text-gray-300">+ 추가</span>}
              </span>
              {meal?.name && <span className="text-xs flex-shrink-0">{info.emoji}</span>}
            </div>
            {meal?.note && <p className="text-[9px] text-gray-400 mt-0.5 truncate pl-4">{meal.note}</p>}
          </div>
          {meal?.name && (
            <>
              <button onClick={e => { e.stopPropagation(); onRecipe?.(meal.name, meal.cuisine); }}
                className="dice-btn absolute top-0.5 left-0.5 w-5 h-5 bg-white border border-gray-200 rounded flex items-center justify-center text-[10px] shadow-sm hover:bg-red-50 hover:border-red-300"
                title="레시피 검색">📺</button>
              <div className="dice-btn absolute bottom-0.5 right-0.5 flex gap-0.5">
                <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'like'); }}
                  className={`w-5 h-5 bg-white border rounded flex items-center justify-center text-[10px] shadow-sm hover:bg-green-50 hover:border-green-300 ${score > 0 ? 'border-green-300' : 'border-gray-200'}`}>👍</button>
                <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'dislike'); }}
                  className={`w-5 h-5 bg-white border rounded flex items-center justify-center text-[10px] shadow-sm hover:bg-red-50 hover:border-red-300 ${score < 0 ? 'border-red-300' : 'border-gray-200'}`}>👎</button>
              </div>
            </>
          )}
        </div>
      );
    }

    function MealCell({ meal, hasChildren, onClick, onClickAdult, onClickChild, onRegen, onRate, onRecipe, ratings = {} }) {
      // ── 분리 모드 (아이 있을 때) ──────────────────────
      if (hasChildren) {
        return (
          <div className="cell-wrap relative space-y-1">
            <HalfCell meal={meal?.adult} icon="👨" onClick={onClickAdult} onRate={onRate} onRecipe={onRecipe} ratings={ratings} />
            <HalfCell meal={meal?.child} icon="🧒" onClick={onClickChild} onRate={onRate} onRecipe={onRecipe} ratings={ratings} />
            {IS_TOUCH ? (
              <button onClick={e => { e.stopPropagation(); onRegen('both'); }}
                className="w-full mt-0.5 py-1 bg-white border border-gray-200 rounded text-[9px] text-gray-500 flex items-center justify-center gap-1 active:bg-orange-50">
                🎲 <span>둘 다 재생성</span>
              </button>
            ) : (
              <button onClick={e => { e.stopPropagation(); onRegen('both'); }}
                className="dice-btn absolute top-0.5 right-0.5 w-5 h-5 bg-white border border-gray-200 rounded flex items-center justify-center text-[10px] shadow-sm hover:bg-orange-50 hover:border-orange-300"
                title="둘 다 재생성">🎲</button>
            )}
          </div>
        );
      }

      // ── 통합 모드 (아이 없을 때) ──────────────────────
      const info = CUISINE_INFO[meal?.cuisine || 'custom'];
      const score = meal?.name ? ((ratings[meal.name]?.likes||0) - (ratings[meal.name]?.dislikes||0)) : 0;
      if (!meal?.name) {
        return (
          <div onClick={onClick}
            className="meal-card border-2 border-dashed border-gray-200 rounded-xl p-2 min-h-[60px] flex items-center justify-center cursor-pointer hover:border-orange-300 hover:bg-orange-50 active:bg-orange-50">
            <span className="text-gray-300 text-xs">+ 추가</span>
          </div>
        );
      }

      // ── 통합 모드 / 터치 레이아웃 ──
      if (IS_TOUCH) {
        return (
          <div className={`border-2 ${info.border} ${info.bg} rounded-xl overflow-hidden${score >= 2 ? ' ring-2 ring-green-300' : score <= -1 ? ' ring-2 ring-red-200' : ''}`}>
            <div onClick={onClick} className="meal-card p-2 cursor-pointer active:opacity-80">
              <div className="flex items-start justify-between gap-1">
                <span className="text-xs font-semibold text-gray-800 leading-tight">{meal.name}</span>
                <span className="text-sm flex-shrink-0">{info.emoji}</span>
              </div>
              <div className="flex items-center gap-1 mt-1 flex-wrap">
                <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${info.badge}`}>{info.label}</span>
                {score >= 2 && <span className="text-[9px] text-green-600">👍</span>}
              </div>
            </div>
            <div className="flex border-t border-gray-100 bg-white/60">
              <button onClick={e => { e.stopPropagation(); onRecipe?.(meal.name, meal.cuisine); }}
                className="flex-1 py-1.5 text-xs flex items-center justify-center border-r border-gray-100 active:bg-red-50">📺</button>
              <button onClick={e => { e.stopPropagation(); onRegen('unified'); }}
                className="flex-1 py-1.5 text-xs flex items-center justify-center border-r border-gray-100 active:bg-orange-50">🎲</button>
              <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'like'); }}
                className={`flex-1 py-1.5 text-xs flex items-center justify-center border-r border-gray-100 active:bg-green-50 ${score > 0 ? 'bg-green-50' : ''}`}>👍</button>
              <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'dislike'); }}
                className={`flex-1 py-1.5 text-xs flex items-center justify-center active:bg-red-50 ${score < 0 ? 'bg-red-50' : ''}`}>👎</button>
            </div>
          </div>
        );
      }

      // ── 통합 모드 / 데스크탑 레이아웃 ──
      return (
        <div className="cell-wrap relative">
          <div onClick={onClick}
            className={`meal-card border-2 ${info.border} ${info.bg} rounded-xl p-2.5 min-h-[72px] cursor-pointer${score >= 2 ? ' ring-2 ring-green-300' : score <= -1 ? ' ring-2 ring-red-200' : ''}`}>
            <div className="flex items-start justify-between gap-1">
              <span className="text-xs font-medium text-gray-800 leading-tight">{meal.name}</span>
              <span className="text-sm flex-shrink-0">{info.emoji}</span>
            </div>
            <div className="flex items-center gap-1 mt-1.5 flex-wrap">
              <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${info.badge}`}>{info.label}</span>
              {meal.note && <span title={meal.note} className="text-[10px] text-gray-400 cursor-help">📝</span>}
              {score >= 2 && <span className="text-[10px] text-green-600 font-medium">👍 자주 먹어요</span>}
            </div>
            {meal.note && (
              <p className="text-[10px] text-gray-400 mt-1 leading-tight truncate" title={meal.note}>{meal.note}</p>
            )}
          </div>
          <button
            onClick={(e) => { e.stopPropagation(); onRegen('unified'); }}
            className="dice-btn absolute top-1.5 right-1.5 w-6 h-6 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs shadow-sm hover:bg-orange-50 hover:border-orange-300"
            title="다른 메뉴로 변경">🎲</button>
          <button
            onClick={(e) => { e.stopPropagation(); onRecipe?.(meal.name, meal.cuisine); }}
            className="dice-btn absolute top-1.5 left-1.5 w-6 h-6 bg-white border border-gray-200 rounded-lg flex items-center justify-center text-xs shadow-sm hover:bg-red-50 hover:border-red-300"
            title="레시피 검색">📺</button>
          <div className="dice-btn absolute bottom-1.5 right-1.5 flex gap-0.5">
            <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'like'); }}
              className={`w-5 h-5 bg-white border rounded-md flex items-center justify-center text-[10px] shadow-sm hover:bg-green-50 hover:border-green-300 ${score > 0 ? 'border-green-300' : 'border-gray-200'}`}>👍</button>
            <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'dislike'); }}
              className={`w-5 h-5 bg-white border rounded-md flex items-center justify-center text-[10px] shadow-sm hover:bg-red-50 hover:border-red-300 ${score < 0 ? 'border-red-300' : 'border-gray-200'}`}>👎</button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  컴포넌트: 메뉴 수정 모달
    // ═══════════════════════════════════════════════════
    function EditModal({ dayIdx, mealType, meal, config, minAge, who, onSave, onClose, customMeals = [], onAddCustomMeal }) {
      const [search, setSearch]     = useState('');
      const [tab, setTab]           = useState('suggest');
      const [customText, setCustomText] = useState(meal?.cuisine === 'custom' && !meal.isUserCustom ? meal.name : '');
      const [note, setNote]         = useState(meal?.note || '');
      const [pendingMeal, setPending] = useState(null);
      const [saveToDb, setSaveToDb] = useState(false);
      const [dbTypes, setDbTypes]   = useState([mealType]);
      const [dbMinAge, setDbMinAge] = useState(0);
      const [dbSpicy, setDbSpicy]   = useState(false);

      // who: 'adult' | 'child' | null(통합)
      const whoLabel  = who === 'adult' ? ' · 성인' : who === 'child' ? ' · 아이' : '';
      const mealLabel = (MEAL_TYPES.find(m => m.id === mealType)?.label || '') + whoLabel;
      // 성인은 나이 제한 없음, 아이는 나이 기반 + 어릴수록 매운 음식 자동 제외
      const effectiveMinAge   = who === 'adult' ? 99 : minAge;
      const effectiveNoSpicy  = who === 'child' ? (minAge <= 6 || config.noSpicy) : config.noSpicy;

      const toggleDbType = (t) => setDbTypes(prev =>
        prev.includes(t) ? (prev.length > 1 ? prev.filter(x => x !== t) : prev) : [...prev, t]
      );

      const suggestions = useMemo(() => {
        const regularPool = getPool(mealType, config.cuisines, effectiveMinAge, effectiveNoSpicy, []);
        const userPool = customMeals.filter(m =>
          m.types.includes(mealType) &&
          m.minAge <= effectiveMinAge &&
          (!effectiveNoSpicy || !m.spicy)
        );
        if (search.trim()) {
          const q = search.trim();
          return [
            ...userPool.filter(m => m.name.includes(q)),
            ...regularPool.filter(m => m.name.includes(q)),
          ];
        }
        return [...userPool, ...shuffle(regularPool).slice(0, Math.max(4, 16 - userPool.length))];
      }, [mealType, config.cuisines, effectiveMinAge, effectiveNoSpicy, search, customMeals]);

      const confirmSave = (base) => {
        if (saveToDb && base.name && onAddCustomMeal) {
          onAddCustomMeal({
            id: 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2),
            name: base.name,
            cuisine: 'custom',
            types: dbTypes,
            minAge: dbMinAge,
            spicy: dbSpicy,
            isUserCustom: true,
          });
        }
        onSave({ ...base, note: note.trim() });
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-3 sm:p-6" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden slide-up" onClick={e => e.stopPropagation()}>
            {/* 헤더 */}
            <div className="p-4 border-b border-gray-100 bg-gradient-to-r from-orange-50 to-amber-50">
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs text-orange-500 font-semibold">{dayIdx+1}일차</p>
                  <h3 className="text-lg font-bold text-gray-800">{mealLabel} 메뉴 선택</h3>
                </div>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl mt-0.5">✕</button>
              </div>
              <div className="flex gap-2 mt-3">
                {['suggest','custom'].map(t => (
                  <button key={t} onClick={() => setTab(t)}
                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t ? 'bg-orange-500 text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-200 hover:border-orange-300'}`}>
                    {t==='suggest' ? '🍽️ 추천 메뉴' : '✏️ 직접 입력'}
                  </button>
                ))}
              </div>
            </div>

            {/* 본문 */}
            <div className="overflow-y-auto" style={{maxHeight:'45svh'}}>
              {tab === 'suggest' ? (
                <div className="p-4">
                  <div className="relative mb-3">
                    <span className="absolute left-3 top-2.5 text-gray-400 text-sm">🔍</span>
                    <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                      placeholder="메뉴 검색..." autoFocus={window.innerWidth > 640}
                      className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm pl-9 focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100" />
                  </div>
                  {suggestions.length === 0 ? (
                    <div className="text-center py-10 text-gray-400">
                      <div className="text-3xl mb-2">🥲</div>
                      <p className="text-sm">검색 결과가 없어요</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-2 gap-2">
                      {suggestions.map((m, idx) => {
                        const info = CUISINE_INFO[m.isUserCustom ? 'custom' : m.cuisine] || CUISINE_INFO['custom'];
                        return (
                          <button key={m.id || idx}
                            onClick={() => { setPending({name:m.name, cuisine:m.isUserCustom?'custom':m.cuisine}); setTab('note'); }}
                            className={`p-3 rounded-xl border text-left transition-all hover:shadow-md active:scale-95 ${m.isUserCustom ? 'bg-yellow-50 border-yellow-300' : info.bg + ' ' + info.border} ${pendingMeal?.name===m.name ? 'ring-2 ring-orange-400' : ''}`}>
                            <div className="flex items-center gap-1">
                              {m.isUserCustom && <span className="text-[10px] text-yellow-500">⭐</span>}
                              <span className="text-sm font-medium text-gray-800 leading-tight">{m.name}</span>
                            </div>
                            <div className="flex items-center gap-1 mt-1.5">
                              <span className="text-xs">{m.isUserCustom ? '⭐' : info.emoji}</span>
                              <span className={`text-[10px] px-1.5 py-0.5 rounded font-medium ${m.isUserCustom ? 'bg-yellow-100 text-yellow-700' : info.badge}`}>{m.isUserCustom ? '내 메뉴' : info.label}</span>
                              {m.spicy && <span className="text-[10px]">🌶️</span>}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : tab === 'custom' ? (
                <div className="p-5 space-y-3">
                  <div>
                    <label className="block text-xs font-semibold text-gray-500 mb-1.5">메뉴 이름</label>
                    <input type="text" value={customText} onChange={e => setCustomText(e.target.value)}
                      onKeyDown={e => { if(e.key==='Enter' && customText.trim()) confirmSave({name:customText.trim(), cuisine:'custom'}); }}
                      placeholder="예) 엄마표 불고기, 오늘의 도시락..."
                      className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
                      autoFocus={window.innerWidth > 640} />
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-500 mb-1.5">메모 <span className="font-normal text-gray-400">(선택)</span></label>
                    <input type="text" value={note} onChange={e => setNote(e.target.value)}
                      placeholder="재료, 주의사항 등..."
                      className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100" />
                  </div>
                  {/* DB 저장 토글 */}
                  <button onClick={() => setSaveToDb(v => !v)}
                    className={`w-full flex items-center justify-between p-3 rounded-xl border-2 transition-all ${saveToDb ? 'border-yellow-400 bg-yellow-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                    <div className="flex items-center gap-2">
                      <span className="text-base">⭐</span>
                      <div className="text-left">
                        <div className={`text-sm font-bold ${saveToDb ? 'text-yellow-700' : 'text-gray-600'}`}>내 메뉴 DB에 저장</div>
                        <div className="text-[10px] text-gray-400">추천 목록에 항상 표시됩니다</div>
                      </div>
                    </div>
                    <div className={`w-9 h-5 rounded-full transition-all flex-shrink-0 ${saveToDb ? 'bg-yellow-400' : 'bg-gray-200'}`}>
                      <div className={`w-4 h-4 bg-white rounded-full shadow-sm mt-0.5 transition-all ${saveToDb ? 'ml-4' : 'ml-0.5'}`} />
                    </div>
                  </button>
                  {saveToDb && (
                    <div className="p-3 bg-yellow-50 rounded-xl border border-yellow-200 space-y-2">
                      <div className="flex gap-1.5">
                        {MEAL_TYPES.map(mt => (
                          <button key={mt.id} onClick={() => toggleDbType(mt.id)}
                            className={`px-2 py-1 rounded-lg text-xs font-medium border transition-all ${dbTypes.includes(mt.id) ? 'bg-yellow-500 text-white border-yellow-500' : 'bg-white text-gray-500 border-gray-200'}`}>
                            {mt.emoji} {mt.label}
                          </button>
                        ))}
                      </div>
                      <div className="flex items-center gap-3">
                        <div className="flex items-center gap-1.5">
                          <span className="text-xs text-gray-500">최소 나이</span>
                          <input type="number" value={dbMinAge} onChange={e => setDbMinAge(parseInt(e.target.value)||0)} min="0" max="18"
                            className="w-12 border border-gray-200 rounded-lg px-1.5 py-1 text-xs text-center" />
                          <span className="text-xs text-gray-400">세+</span>
                        </div>
                        <button onClick={() => setDbSpicy(v => !v)}
                          className={`flex items-center gap-1 px-2 py-1 rounded-lg border text-xs font-medium transition-all ${dbSpicy ? 'bg-rose-50 border-rose-300 text-rose-600' : 'bg-white border-gray-200 text-gray-500'}`}>
                          🌶️ {dbSpicy ? '매운 음식' : '안 매운 음식'}
                        </button>
                      </div>
                    </div>
                  )}
                  <button onClick={() => customText.trim() && confirmSave({name:customText.trim(), cuisine:'custom'})}
                    disabled={!customText.trim()}
                    className="w-full py-3 bg-orange-500 text-white rounded-xl font-bold text-sm disabled:opacity-40 hover:bg-orange-600 transition-all shadow-sm">
                    저장하기 ✓
                  </button>
                </div>
              ) : (
                /* note 탭: 추천 메뉴 선택 후 메모 입력 */
                <div className="p-5 space-y-3">
                  <div className={`p-3 rounded-xl border-2 ${CUISINE_INFO[pendingMeal?.cuisine||'custom'].border} ${CUISINE_INFO[pendingMeal?.cuisine||'custom'].bg}`}>
                    <div className="flex items-center gap-2">
                      <span className="text-lg">{CUISINE_INFO[pendingMeal?.cuisine||'custom'].emoji}</span>
                      <span className="font-bold text-gray-800">{pendingMeal?.name}</span>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-semibold text-gray-500 mb-1.5">메모 <span className="font-normal text-gray-400">(선택)</span></label>
                    <input type="text" value={note} onChange={e => setNote(e.target.value)}
                      onKeyDown={e => { if(e.key==='Enter') confirmSave(pendingMeal); }}
                      placeholder="재료, 소스, 주의사항 등..."
                      autoFocus={window.innerWidth > 640}
                      className="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100" />
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => { setPending(null); setTab('suggest'); }}
                      className="flex-1 py-2.5 border border-gray-200 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-50 transition-all">
                      ← 다시 선택
                    </button>
                    <button onClick={() => confirmSave(pendingMeal)}
                      className="flex-1 py-2.5 bg-orange-500 text-white rounded-xl text-sm font-bold hover:bg-orange-600 transition-all shadow-sm">
                      저장하기 ✓
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  컴포넌트: 내 메뉴 DB 관리 모달
    // ═══════════════════════════════════════════════════
    function CustomMealsModal({ customMeals, onAdd, onDelete, onClose }) {
      const [name, setName]     = useState('');
      const [types, setTypes]   = useState(['lunch','dinner']);
      const [minAge, setMinAge] = useState(0);
      const [spicy, setSpicy]   = useState(false);

      const toggleType = (t) => setTypes(prev =>
        prev.includes(t) ? (prev.length > 1 ? prev.filter(x => x !== t) : prev) : [...prev, t]
      );

      const handleAdd = () => {
        if (!name.trim()) return;
        onAdd({
          id: 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2),
          name: name.trim(),
          cuisine: 'custom',
          types,
          minAge,
          spicy,
          isUserCustom: true,
        });
        setName('');
        setTypes(['lunch','dinner']);
        setMinAge(0);
        setSpicy(false);
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-3 sm:p-6" onClick={onClose}>
