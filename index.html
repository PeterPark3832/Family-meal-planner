    //  컴포넌트: 장보기 목록 모달
    // ═══════════════════════════════════════════════════
    function ShoppingListModal({ mealPlan, period, hasChildren, onClose }) {
      const [checked, setChecked]   = useState(new Set());
      const [copied, setCopied]     = useState(false);
      const [view, setView]         = useState('category'); // 'category' | 'meal'

      const { grouped, totalCount, mealList, ingToMeals } = useMemo(() => {
        // 1) 식단에 등장하는 메뉴 수집 (중복 제거)
        const mealNames = new Set();
        for (let d = 0; d < period; d++) {
          for (const mt of ['breakfast','lunch','dinner']) {
            const slot = mealPlan[d]?.[mt];
            if (!slot) continue;
            if (hasChildren) {
              if (slot.adult?.name) mealNames.add(slot.adult.name);
              if (slot.child?.name) mealNames.add(slot.child.name);
            } else {
              if (slot.name) mealNames.add(slot.name);
            }
          }
        }

        // 2) 재료별 보기: 카테고리 그룹 + 재료→메뉴 역매핑
        const ingredients = new Set();
        const ingToMeals = {};
        mealNames.forEach(name => {
          (MEAL_INGREDIENTS[name] || []).forEach(ing => {
            ingredients.add(ing);
            if (!ingToMeals[ing]) ingToMeals[ing] = [];
            if (!ingToMeals[ing].includes(name)) ingToMeals[ing].push(name);
          });
        });
        const groups = {};
        ingredients.forEach(ing => {
          const cat = INGREDIENT_CATEGORY[ing] || '기타';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(ing);
        });
        CAT_ORDER.forEach(cat => { if (groups[cat]) groups[cat].sort(); });

        // 3) 메뉴별 보기: 메뉴명 + 재료 목록
        const mealList = [...mealNames]
          .filter(name => MEAL_INGREDIENTS[name])
          .sort()
          .map(name => ({
            name,
            cuisine: [...MEALS].find(m => m.name === name)?.cuisine || 'custom',
            ingredients: MEAL_INGREDIENTS[name] || [],
          }));

        return { grouped: groups, totalCount: ingredients.size, mealList, ingToMeals };
      }, [mealPlan, period, hasChildren]);

      const toggle = (item) => setChecked(prev => {
        const next = new Set(prev);
        next.has(item) ? next.delete(item) : next.add(item);
        return next;
      });

      const remaining = totalCount - checked.size;

      const copyCategory = () => {
        const lines = ['🛒 장보기 목록\n'];
        CAT_ORDER.forEach(cat => {
          const items = (grouped[cat] || []).filter(i => !checked.has(i));
          if (items.length) {
            lines.push(`[${CAT_EMOJI[cat]} ${cat}]`);
            items.forEach(i => lines.push(`  ☐ ${i}`));
            lines.push('');
          }
        });
        navigator.clipboard.writeText(lines.join('\n')).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 2000);
        });
      };

      const copyMeal = () => {
        const lines = ['🍽️ 메뉴별 재료 목록\n'];
        mealList.forEach(({ name, ingredients }) => {
          lines.push(`[ ${name} ]`);
          lines.push(`  ${ingredients.join(', ')}`);
          lines.push('');
        });
        navigator.clipboard.writeText(lines.join('\n')).then(() => {
          setCopied(true); setTimeout(() => setCopied(false), 2000);
        });
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-3 sm:p-6" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden slide-up" onClick={e => e.stopPropagation()}>
            {/* 헤더 */}
            <div className="p-4 border-b border-gray-100 bg-gradient-to-r from-green-50 to-emerald-50">
              <div className="flex justify-between items-start mb-3">
                <div>
                  <h3 className="text-lg font-bold text-gray-800">🛒 장보기 목록</h3>
                  <p className="text-xs text-gray-500 mt-0.5">
                    {view === 'category'
                      ? <>총 {totalCount}가지 재료 · 남은 항목 <span className="text-green-600 font-bold">{remaining}개</span></>
                      : <>{mealList.length}가지 메뉴의 재료를 한눈에</>
                    }
                  </p>
                </div>
                <div className="flex gap-2 items-center">
                  <button onClick={view === 'category' ? copyCategory : copyMeal}
                    className={`px-3 py-1.5 rounded-xl text-xs font-medium border transition-all ${copied ? 'bg-green-100 border-green-300 text-green-700' : 'bg-white border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                    {copied ? '✓ 복사됨' : '📋 복사'}
                  </button>
                  <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
                </div>
              </div>
              {/* 탭 */}
              <div className="flex gap-2">
                {[['category','📦 재료별'],['meal','🍽️ 메뉴별']].map(([v, label]) => (
                  <button key={v} onClick={() => setView(v)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${view === v ? 'bg-green-500 text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-200 hover:border-green-300'}`}>
                    {label}
                  </button>
                ))}
              </div>
            </div>

            {/* 본문 */}
            <div className="overflow-y-auto" style={{maxHeight:'60vh'}}>
              {totalCount === 0 ? (
                <div className="text-center py-12 text-gray-400">
                  <div className="text-3xl mb-2">🧺</div>
                  <p className="text-sm">식단에 등록된 재료가 없어요</p>
                </div>
              ) : view === 'category' ? (
                /* ── 재료별 탭 ── */
                <div className="p-4 space-y-4">
                  {CAT_ORDER.filter(cat => grouped[cat]).map(cat => (
                    <div key={cat}>
                      <p className="text-xs font-bold text-gray-500 mb-2">{CAT_EMOJI[cat]} {cat}</p>
                      <div className="space-y-1.5">
                        {grouped[cat].map(item => (
                          <div key={item}
                            className={`flex items-center gap-2 px-3 py-2 rounded-xl border transition-all ${
                              checked.has(item)
                                ? 'bg-gray-50 border-gray-200'
                                : 'bg-white border-gray-200 hover:border-green-300 hover:bg-green-50'
                            }`}>
                            {/* 체크 영역 */}
                            <button onClick={() => toggle(item)} className="flex items-start gap-2 flex-1 text-left min-w-0">
                              <span className={`w-4 h-4 rounded border flex-shrink-0 flex items-center justify-center text-[10px] mt-0.5 ${checked.has(item) ? 'bg-gray-300 border-gray-300 text-white' : 'border-gray-300'}`}>
                                {checked.has(item) ? '✓' : ''}
                              </span>
                              <div className="flex-1 min-w-0">
                                <span className={`text-sm font-medium ${checked.has(item) ? 'line-through text-gray-300' : 'text-gray-700'}`}>{item}</span>
                                {!checked.has(item) && ingToMeals[item] && (
                                  <div className="flex flex-wrap gap-1 mt-1">
                                    {ingToMeals[item].slice(0, 4).map(meal => {
                                      const c = [...MEALS].find(m => m.name === meal)?.cuisine || 'custom';
                                      return (
                                        <span key={meal} className={`text-[9px] px-1.5 py-0.5 rounded-full border ${CUISINE_INFO[c].badge} ${CUISINE_INFO[c].border}`}>
                                          {meal}
                                        </span>
                                      );
                                    })}
                                    {ingToMeals[item].length > 4 && (
                                      <span className="text-[9px] text-gray-400">+{ingToMeals[item].length - 4}</span>
                                    )}
                                  </div>
                                )}
                              </div>
                            </button>
                            {/* 쿠팡 버튼 */}
                            {!checked.has(item) && (
                              <a href={coupangUrl(item)} target="_blank" rel="noopener noreferrer sponsored"
                                onClick={e => e.stopPropagation()}
                                className="flex-shrink-0 text-[10px] px-2 py-1 bg-red-50 border border-red-200 text-red-500 rounded-lg font-bold hover:bg-red-100 hover:text-red-600 transition-all whitespace-nowrap">
                                쿠팡↗
                              </a>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                /* ── 메뉴별 탭 ── */
                <div className="p-4 space-y-3">
                  {mealList.map(({ name, cuisine, ingredients }) => {
                    const info = CUISINE_INFO[cuisine] || CUISINE_INFO['custom'];
                    const allChecked = ingredients.every(i => checked.has(i));
                    return (
                      <div key={name} className={`rounded-xl border p-3 transition-all ${allChecked ? 'opacity-50 bg-gray-50 border-gray-200' : `${info.bg} ${info.border}`}`}>
                        <div className="flex items-center gap-2 mb-2">
                          <span className="text-base">{info.emoji}</span>
                          <span className={`font-bold text-sm ${allChecked ? 'text-gray-400 line-through' : 'text-gray-800'}`}>{name}</span>
                          <span className={`ml-auto text-[10px] px-1.5 py-0.5 rounded font-medium ${info.badge}`}>{info.label}</span>
                        </div>
                        <div className="flex flex-wrap gap-1.5">
                          {ingredients.map(ing => (
                            <button key={ing} onClick={() => toggle(ing)}
                              className={`text-xs px-2 py-1 rounded-lg border transition-all ${
                                checked.has(ing)
                                  ? 'bg-gray-100 border-gray-200 text-gray-400 line-through'
                                  : 'bg-white border-gray-300 text-gray-700 hover:border-green-400 hover:bg-green-50'
                              }`}>
                              {checked.has(ing) ? '✓ ' : ''}{ing}
                            </button>
                          ))}
                        </div>
                        <div className="mt-2.5 pt-2.5 border-t border-gray-100">
                          <a href={coupangMealUrl()} target="_blank" rel="noopener noreferrer sponsored"
                            className="inline-flex items-center gap-1 text-[11px] text-red-500 font-semibold hover:text-red-600 transition-colors">
                            🛒 쿠팡에서 재료 장보기 →
                          </a>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* 하단 */}
            <div className="border-t border-gray-100 bg-gray-50">
              {view === 'category' && checked.size > 0 && (
                <button onClick={() => setChecked(new Set())}
                  className="w-full py-2 text-xs text-gray-500 hover:text-gray-700 transition-colors border-b border-gray-100">
                  체크 모두 해제
                </button>
              )}
              <p className="text-center text-[10px] text-gray-400 py-2 px-4">
                쿠팡 파트너스 활동의 일환으로 수수료를 받을 수 있습니다
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  컴포넌트: 요리 분포 통계
    // ═══════════════════════════════════════════════════
    const NUTRITION_INFO = {
      protein:  { label:'단백질',   emoji:'🥩', bar:'bg-rose-400'   },
      veggie:   { label:'채소',     emoji:'🥦', bar:'bg-green-400'  },
      carb:     { label:'탄수화물', emoji:'🌾', bar:'bg-amber-400'  },
      balanced: { label:'균형',     emoji:'⚖️', bar:'bg-blue-400'   },
    };

    function StatsPanel({ mealPlan, period, hasChildren }) {
      const { cuisineCounts, nutritionCounts } = useMemo(() => {
        const c = { korean:0, western:0, chinese:0, japanese:0, custom:0 };
        const n = { protein:0, veggie:0, carb:0, balanced:0, unknown:0 };
        const addMeal = (name, cuisine) => {
          if (name && c[cuisine] !== undefined) c[cuisine]++;
          const tag = MEAL_NUTRITION[name];
          if (tag) n[tag]++; else n.unknown++;
        };
        for (let d = 0; d < period; d++) {
          for (const mt of ['breakfast','lunch','dinner']) {
            const slot = mealPlan[d]?.[mt];
            if (!slot) continue;
            if (hasChildren) {
              addMeal(slot.adult?.name, slot.adult?.cuisine);
              addMeal(slot.child?.name, slot.child?.cuisine);
            } else {
              addMeal(slot.name, slot.cuisine);
            }
          }
        }
        return { cuisineCounts: c, nutritionCounts: n };
      }, [mealPlan, period, hasChildren]);

      const cTotal = Object.values(cuisineCounts).reduce((a,b) => a+b, 0) || 1;
      const nTotal = (Object.values(nutritionCounts).reduce((a,b) => a+b, 0) - nutritionCounts.unknown) || 1;

      return (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 no-print space-y-4">
          {/* 요리 분포 */}
          <div>
            <h3 className="text-sm font-bold text-gray-700 mb-3">📊 요리 분포</h3>
            <div className="space-y-2">
              {Object.entries(cuisineCounts).filter(([,v]) => v > 0).map(([cuisine, cnt]) => {
                const info = CUISINE_INFO[cuisine];
                const pct = Math.round(cnt / cTotal * 100);
                return (
                  <div key={cuisine} className="flex items-center gap-2">
                    <span className="text-xs w-12 text-gray-600 flex-shrink-0">{info.emoji} {info.label}</span>
                    <div className="flex-1 h-2.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className={`h-full rounded-full ${info.bar} transition-all`} style={{width:`${pct}%`}} />
                    </div>
                    <span className="text-xs text-gray-500 w-8 text-right flex-shrink-0">{pct}%</span>
                    <span className="text-xs text-gray-400 w-8 flex-shrink-0">{cnt}식</span>
                  </div>
                );
              })}
            </div>
          </div>
          {/* 영양 분포 */}
          <div>
            <h3 className="text-sm font-bold text-gray-700 mb-3">🥗 영양 분포</h3>
            <div className="space-y-2">
              {Object.entries(NUTRITION_INFO).map(([key, info]) => {
                const cnt = nutritionCounts[key] || 0;
                const pct = Math.round(cnt / nTotal * 100);
                return (
                  <div key={key} className="flex items-center gap-2">
                    <span className="text-xs w-16 text-gray-600 flex-shrink-0">{info.emoji} {info.label}</span>
                    <div className="flex-1 h-2.5 bg-gray-100 rounded-full overflow-hidden">
                      <div className={`h-full rounded-full ${info.bar} transition-all`} style={{width:`${pct}%`}} />
                    </div>
                    <span className="text-xs text-gray-500 w-8 text-right flex-shrink-0">{pct}%</span>
                    <span className="text-xs text-gray-400 w-8 flex-shrink-0">{cnt}식</span>
                  </div>
                );
              })}
            </div>
            {nutritionCounts.protein > nutritionCounts.veggie * 2 && (
              <p className="text-[10px] text-amber-600 mt-2 bg-amber-50 rounded-lg px-2 py-1">💡 채소 위주 메뉴를 조금 더 넣어보세요</p>
            )}
            {nutritionCounts.carb > (nutritionCounts.protein + nutritionCounts.veggie) && (
              <p className="text-[10px] text-blue-600 mt-2 bg-blue-50 rounded-lg px-2 py-1">💡 단백질·채소 메뉴의 비중을 늘려보세요</p>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  컴포넌트: 이전 식단 복원 프롬프트
    // ═══════════════════════════════════════════════════
    function RestorePrompt({ savedAt, onRestore, onDismiss }) {
      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm fade-in text-center">
            <div className="text-4xl mb-3">💾</div>
            <h3 className="text-lg font-bold text-gray-800 mb-1">이전 식단이 있어요</h3>
            <p className="text-sm text-gray-500 mb-5">
              {formatTime(savedAt)}에 저장된 식단을<br />이어서 보시겠어요?
            </p>
            <div className="flex gap-3">
              <button onClick={onDismiss}
                className="flex-1 py-2.5 border border-gray-200 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-50 transition-all">
                새로 만들기
              </button>
              <button onClick={onRestore}
                className="flex-1 py-2.5 bg-orange-500 text-white rounded-xl text-sm font-bold hover:bg-orange-600 transition-all shadow-md">
                이어서 보기 →
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  컴포넌트: 식단 템플릿 저장/불러오기
    // ═══════════════════════════════════════════════════
    function TemplateModal({ templates, currentConfig, currentPlan, onSave, onLoad, onDelete, onClose }) {
      const [name, setName] = useState('');
      const [saved, setSaved] = useState(false);

      const handleSave = () => {
        if (!name.trim()) return;
        onSave({ name: name.trim() });
        setName('');
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      };

      return (
        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-3 sm:p-6" onClick={onClose}>
          <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden slide-up" onClick={e => e.stopPropagation()}>
            <div className="p-4 border-b border-gray-100 bg-gradient-to-r from-violet-50 to-purple-50">
              <div className="flex justify-between items-center">
                <div>
                  <h3 className="text-lg font-bold text-gray-800">📋 식단 템플릿</h3>
                  <p className="text-xs text-gray-500 mt-0.5">지금 식단을 저장하고 나중에 다시 불러올 수 있어요</p>
                </div>
                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl">✕</button>
              </div>
            </div>

            <div className="overflow-y-auto" style={{maxHeight:'65vh'}}>
              {/* 현재 식단 저장 */}
              <div className="p-4 border-b border-gray-100 bg-gray-50">
                <label className="block text-xs font-semibold text-gray-500 mb-1.5">현재 식단 저장</label>
                <div className="flex gap-2">
                  <input type="text" value={name} onChange={e => setName(e.target.value)}
                    onKeyDown={e => { if(e.key === 'Enter' && name.trim()) handleSave(); }}
                    placeholder="템플릿 이름 (예: 7월 2주차 식단)"
                    className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-violet-400 focus:ring-2 focus:ring-violet-100" />
                  <button onClick={handleSave} disabled={!name.trim()}
                    className={`px-4 py-2 rounded-xl text-sm font-bold transition-all disabled:opacity-40 ${saved ? 'bg-green-500 text-white' : 'bg-violet-500 text-white hover:bg-violet-600'}`}>
                    {saved ? '✓' : '저장'}
                  </button>
                </div>
                <p className="text-[10px] text-gray-400 mt-1.5">
                  {currentConfig?.period}일 플랜 · {currentConfig?.cuisines?.map(c => CUISINE_INFO[c]?.label).join('/')}
                  {currentConfig?.allergens?.length > 0 && ` · 알레르기 ${currentConfig.allergens.length}개 제외`}
                </p>
              </div>

              {/* 저장된 템플릿 목록 */}
              <div className="p-4">
                <p className="text-xs font-semibold text-gray-400 mb-3">저장된 템플릿 ({templates.length}개)</p>
                {templates.length === 0 ? (
                  <div className="text-center py-8 text-gray-400">
                    <div className="text-3xl mb-2">📭</div>
                    <p className="text-sm">저장된 템플릿이 없어요</p>
                    <p className="text-xs mt-1">위에서 현재 식단을 저장해보세요</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {[...templates].reverse().map(t => (
                      <div key={t.id} className="flex items-center gap-2 p-3 bg-violet-50 rounded-xl border border-violet-200">
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-bold text-gray-800 truncate">{t.name}</p>
                          <p className="text-[10px] text-gray-400 mt-0.5">
                            {t.config?.period}일 · {t.config?.cuisines?.map(c => CUISINE_INFO[c]?.label).join('/')} · {formatTime(t.savedAt)}
                          </p>
                        </div>
                        <button onClick={() => { onLoad(t); onClose(); }}
                          className="px-3 py-1.5 bg-violet-500 text-white rounded-lg text-xs font-bold hover:bg-violet-600 transition-all flex-shrink-0">
                          불러오기
                        </button>
                        <button onClick={() => onDelete(t.id)}
                          className="text-gray-300 hover:text-red-400 transition-colors flex-shrink-0">🗑️</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  설정 스텝 컴포넌트들
    // ═══════════════════════════════════════════════════
    function StepFamily({ members, setMembers }) {
      const updateCount = (n) => {
        const next = [...members];
        while (next.length < n) next.push({ type:'adult', gender:'female', age:30 });
        setMembers(next.slice(0, n));
      };
      const update = (i, field, val) => {
        const next = [...members];
        next[i] = { ...next[i], [field]: val };
        if (field==='type' && val==='adult') next[i].age = 35;
        if (field==='type' && val==='child') next[i].age = 8;
        setMembers(next);
      };
      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">가족 구성원 설정</h2>
          <p className="text-gray-500 text-sm mb-5">함께 식사하는 인원을 알려주세요</p>
          <div className="mb-5">
            <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2.5">인원 수</label>
            <div className="flex gap-2 flex-wrap">
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => updateCount(n)}
                  className={`w-11 h-11 rounded-xl border-2 font-bold text-sm transition-all ${members.length===n ? 'border-orange-500 bg-orange-500 text-white shadow-md' : 'border-gray-200 text-gray-500 hover:border-orange-300'}`}>
                  {n}
                </button>
              ))}
              <span className="flex items-center text-gray-500 text-sm pl-1">명</span>
            </div>
          </div>
          <div className="space-y-2.5">
            {members.map((m, i) => (
              <div key={i} className="flex items-center gap-2.5 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <div className="w-9 h-9 rounded-full bg-orange-100 flex items-center justify-center text-lg flex-shrink-0">
                  {m.type==='child' ? '🧒' : m.gender==='male' ? '👨' : '👩'}
                </div>
                <div className="flex-1 flex flex-wrap items-center gap-2 min-w-0">
                  <select value={m.type} onChange={e => update(i,'type',e.target.value)}
                    className="border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm bg-white focus:outline-none focus:border-orange-400">
                    <option value="adult">성인</option>
                    <option value="child">자녀</option>
                  </select>
                  <select value={m.gender} onChange={e => update(i,'gender',e.target.value)}
                    className="border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm bg-white focus:outline-none focus:border-orange-400">
                    <option value="male">남성</option>
                    <option value="female">여성</option>
                  </select>
                  <div className="flex items-center gap-1">
                    <input type="number" value={m.age}
                      onChange={e => update(i,'age',parseInt(e.target.value)||0)}
                      min={m.type==='child'?1:18} max={99}
                      className="w-14 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center bg-white focus:outline-none focus:border-orange-400" />
                    <span className="text-gray-500 text-sm">세</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function StepPeriod({ period, setPeriod, custom, setCustom }) {
      const opts = [
        { val:7,  label:'1주일', sub:'7일'  },
        { val:14, label:'2주일', sub:'14일' },
        { val:21, label:'3주일', sub:'21일' },
        { val:30, label:'한 달', sub:'30일' },
      ];
      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">식단 기간 선택</h2>
          <p className="text-gray-500 text-sm mb-5">얼마나 계획하실 건가요?</p>
          <div className="grid grid-cols-2 gap-3 mb-3">
            {opts.map(o => (
              <button key={o.val} onClick={() => { setPeriod(o.val); setCustom(''); }}
                className={`p-4 rounded-xl border-2 text-left transition-all ${period===o.val && custom==='' ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:border-gray-300 bg-white'}`}>
                <div className={`font-bold text-lg ${period===o.val && custom==='' ? 'text-orange-600' : 'text-gray-700'}`}>{o.label}</div>
                <div className="text-gray-400 text-xs mt-0.5">{o.sub}</div>
              </button>
            ))}
          </div>
          <div onClick={() => setCustom(p => p==='' ? '10' : p)}
            className={`p-4 rounded-xl border-2 cursor-pointer transition-all ${custom!=='' ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:border-gray-300 bg-white'}`}>
            <div className={`font-bold mb-2 ${custom!=='' ? 'text-orange-600' : 'text-gray-700'}`}>✏️ 직접 입력</div>
            <div className="flex items-center gap-2" onClick={e => e.stopPropagation()}>
              <input type="number" value={custom}
                onChange={e => { setCustom(e.target.value); setPeriod(parseInt(e.target.value)||7); }}
                placeholder="일 수 입력" min="1" max="90"
                className="w-24 border border-gray-300 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-orange-400" />
              <span className="text-gray-500 text-sm">일</span>
            </div>
          </div>
        </div>
      );
    }

    function StepCuisine({ cuisines, setCuisines, noSpicy, setNoSpicy, allergens, setAllergens }) {
      const toggle = (c) => setCuisines(prev =>
        prev.includes(c) ? (prev.length>1 ? prev.filter(x=>x!==c) : prev) : [...prev, c]
      );
      const toggleAllergen = (a) => setAllergens(prev =>
        prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a]
      );
      const items = [
        { key:'korean',   icon:'🍚', desc:'김치찌개, 불고기, 된장찌개...' },
        { key:'western',  icon:'🍝', desc:'파스타, 피자, 오므라이스...'   },
        { key:'chinese',  icon:'🥢', desc:'짜장면, 탕수육, 볶음밥...'    },
        { key:'japanese', icon:'🍱', desc:'우동, 돈카츠, 오야코동...'     },
      ];
      return (
        <div className="fade-in">
          <h2 className="text-xl font-bold text-gray-800 mb-1">요리 종류 선택</h2>
          <p className="text-gray-500 text-sm mb-5">선호하는 요리를 선택하세요 <span className="text-orange-500 font-medium">(중복 선택 가능)</span></p>
          <div className="grid grid-cols-2 gap-3">
            {items.map(({ key, icon, desc }) => {
              const info = CUISINE_INFO[key];
              const on = cuisines.includes(key);
              return (
                <button key={key} onClick={() => toggle(key)}
                  className={`p-5 rounded-xl border-2 text-left transition-all relative ${on ? `${info.border} ${info.bg} shadow-md` : 'border-gray-200 bg-white hover:border-gray-300'}`}>
                  {on && <div className="absolute top-2.5 right-2.5 w-5 h-5 bg-green-500 rounded-full flex items-center justify-center text-white text-xs font-bold">✓</div>}
                  <div className="text-3xl mb-2">{icon}</div>
                  <div className={`font-bold ${on ? 'text-gray-800' : 'text-gray-600'}`}>{info.label}</div>
                  <div className="text-gray-400 text-xs mt-1 leading-tight">{desc}</div>
                </button>
              );
            })}
          </div>
          <p className="text-xs text-gray-400 mt-4 text-center">* 최소 1개 이상 선택해야 합니다</p>

          {/* 매운 음식 제외 토글 */}
          <button
            onClick={() => setNoSpicy(v => !v)}
            className={`mt-4 w-full flex items-center justify-between p-4 rounded-xl border-2 transition-all ${noSpicy ? 'border-rose-400 bg-rose-50' : 'border-gray-200 bg-white hover:border-gray-300'}`}>
            <div className="flex items-center gap-3">
              <span className="text-xl">🌶️</span>
              <div className="text-left">
                <div className={`font-bold text-sm ${noSpicy ? 'text-rose-600' : 'text-gray-700'}`}>매운 음식 제외</div>
                <div className="text-xs text-gray-400 mt-0.5">제육볶음, 김치찌개, 짬뽕 등 🌶️ 음식을 추천에서 뺍니다</div>
              </div>
            </div>
            <div className={`w-10 h-6 rounded-full transition-all flex-shrink-0 ${noSpicy ? 'bg-rose-500' : 'bg-gray-200'}`}>
              <div className={`w-5 h-5 bg-white rounded-full shadow-sm mt-0.5 transition-all ${noSpicy ? 'translate-x-4.5 ml-5' : 'ml-0.5'}`} />
            </div>
          </button>

          {/* 알레르기 제외 */}
          <div className="mt-4 p-4 rounded-xl border-2 border-gray-200 bg-white">
            <div className="flex items-center gap-2 mb-3">
              <span className="text-xl">⚠️</span>
              <div>
                <div className="font-bold text-sm text-gray-700">알레르기 제외</div>
                <div className="text-xs text-gray-400 mt-0.5">해당 재료가 포함된 메뉴를 추천에서 제외합니다</div>
              </div>
            </div>
            <div className="flex flex-wrap gap-2">
              {Object.entries(ALLERGEN_INFO).map(([key, { label, emoji }]) => {
                const on = allergens.includes(key);
                return (
                  <button key={key} onClick={() => toggleAllergen(key)}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-medium transition-all ${on ? 'bg-amber-100 border-amber-400 text-amber-700' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                    <span>{emoji}</span>{label}
                    {on && <span className="text-amber-500">✓</span>}
                  </button>
                );
              })}
            </div>
            {allergens.length > 0 && (
              <p className="text-[10px] text-amber-600 mt-2">
                ⚠️ {allergens.map(a => ALLERGEN_INFO[a]?.label).join(', ')} 포함 메뉴가 제외됩니다
              </p>
            )}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  모바일 전용: 하루 카드 뷰
    // ═══════════════════════════════════════════════════

    function MobilePersonRow({ icon, meal, ratings = {}, onEdit, onRate, onRecipe }) {
      const info = CUISINE_INFO[meal?.cuisine || 'custom'];
      const score = meal?.name ? ((ratings[meal.name]?.likes||0) - (ratings[meal.name]?.dislikes||0)) : 0;
      return (
        <div className="border-b border-gray-50 last:border-0">
          <div onClick={onEdit} className="px-4 py-3 flex items-center gap-2 cursor-pointer active:bg-gray-50">
            <span className="text-base flex-shrink-0">{icon}</span>
            <div className="flex-1 min-w-0">
              {meal?.name
                ? <span className={`font-semibold text-gray-800 text-sm${score >= 2 ? ' text-green-700' : score <= -1 ? ' text-red-400' : ''}`}>{meal.name}</span>
                : <span className="text-gray-300 text-sm">+ 추가</span>}
            </div>
            {meal?.name && <span className="text-base flex-shrink-0">{info.emoji}</span>}
          </div>
          {meal?.name && (
            <div className="flex gap-1.5 px-4 pb-2.5">
              <button onClick={e => { e.stopPropagation(); onRecipe?.(meal.name, meal.cuisine); }}
                className="flex-1 py-1.5 bg-gray-50 rounded-xl text-sm flex items-center justify-center border border-gray-100 active:bg-red-50">📺</button>
              <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'like'); }}
                className={`flex-1 py-1.5 rounded-xl text-sm flex items-center justify-center border active:bg-green-50 ${score > 0 ? 'bg-green-50 border-green-200' : 'bg-gray-50 border-gray-100'}`}>👍</button>
              <button onClick={e => { e.stopPropagation(); onRate?.(meal.name, 'dislike'); }}
                className={`flex-1 py-1.5 rounded-xl text-sm flex items-center justify-center border active:bg-red-50 ${score < 0 ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-100'}`}>👎</button>
            </div>
          )}
        </div>
      );
    }

    function MobileMealCard({ mealType, meal, hasChildren, ratings, onEditAdult, onEditChild, onEditUnified, onRate, onRecipe, onRegen }) {
      const unified = !hasChildren;
      const info = unified ? CUISINE_INFO[meal?.cuisine || 'custom'] : null;
      const score = unified && meal?.name ? ((ratings[meal.name]?.likes||0) - (ratings[meal.name]?.dislikes||0)) : 0;
      return (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          {/* 식사 유형 헤더 */}
          <div className="px-4 py-2 bg-gray-50 border-b border-gray-100 flex items-center gap-2">
            <span className="text-lg">{mealType.emoji}</span>
            <span className="font-bold text-gray-700 text-sm">{mealType.label}</span>
          </div>

          {unified ? (
            meal?.name ? (
              <>
                <div onClick={onEditUnified} className="px-4 py-3 flex items-center gap-3 cursor-pointer active:bg-gray-50">
                  <div className="flex-1 min-w-0">
                    <span className={`inline-block px-2 py-0.5 rounded-full text-[11px] font-medium ${info.badge} mr-2`}>{info.label}</span>
                    <span className={`font-semibold text-gray-800 text-sm${score >= 2 ? ' text-green-700' : ''}`}>{meal.name}</span>
                  </div>
                  <span className="text-xl flex-shrink-0">{info.emoji}</span>
                </div>
                <div className="flex border-t border-gray-100">
                  <button onClick={() => onRecipe?.(meal.name, meal.cuisine)} className="flex-1 py-2.5 text-base flex items-center justify-center border-r border-gray-100 active:bg-red-50">📺</button>
                  <button onClick={() => onRegen('unified')} className="flex-1 py-2.5 text-base flex items-center justify-center border-r border-gray-100 active:bg-orange-50">🎲</button>
                  <button onClick={() => onRate?.(meal.name, 'like')} className={`flex-1 py-2.5 text-base flex items-center justify-center border-r border-gray-100 active:bg-green-50 ${score > 0 ? 'bg-green-50' : ''}`}>👍</button>
                  <button onClick={() => onRate?.(meal.name, 'dislike')} className={`flex-1 py-2.5 text-base flex items-center justify-center active:bg-red-50 ${score < 0 ? 'bg-red-50' : ''}`}>👎</button>
                </div>
              </>
            ) : (
              <button onClick={onEditUnified} className="w-full px-4 py-5 text-gray-300 text-sm flex items-center justify-center active:bg-gray-50">+ 메뉴 추가</button>
            )
          ) : (
            <>
              <MobilePersonRow icon="👨" meal={meal?.adult} ratings={ratings}
                onEdit={onEditAdult} onRate={onRate} onRecipe={onRecipe} />
              <MobilePersonRow icon="🧒" meal={meal?.child} ratings={ratings}
                onEdit={onEditChild} onRate={onRate} onRecipe={onRecipe} />
              <button onClick={() => onRegen('both')}
                className="w-full py-2.5 text-xs text-gray-400 flex items-center justify-center gap-1 border-t border-gray-100 active:bg-orange-50">
                🎲 <span>둘 다 재생성</span>
              </button>
            </>
          )}
        </div>
      );
    }

    function MobilePlanView({ mealPlan, config, hasChildren, ratings, onEdit, onRate, onRecipe, onRegen }) {
      const period  = config.period;
      const todayDow  = new Date().getDay();
      const todayDayIdx = todayDow === 0 ? 6 : todayDow - 1;
      const initDay = (() => {
        for (let i = 0; i < period; i++) { if (i % 7 === todayDayIdx) return i; }
        return 0;
      })();
      const [selectedDay, setSelectedDay] = useState(initDay);
      const dayRef = React.useRef(null);

      useEffect(() => {
        if (dayRef.current) {
          const btn = dayRef.current.querySelector(`[data-day="${selectedDay}"]`);
          btn?.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
        }
      }, [selectedDay]);

      const meal = mealPlan[selectedDay] || {};

      return (
        <div>
          {/* 날짜 탭 */}
          <div ref={dayRef} className="flex gap-2 overflow-x-auto pb-2 mb-4 no-scrollbar" style={{scrollbarWidth:'none'}}>
            {Array.from({length: period}, (_, i) => {
              const dow = i % 7;
              const isSat = dow === 5, isSun = dow === 6;
              const isToday = dow === todayDayIdx && i < 7;
              const sel = selectedDay === i;
              return (
                <button key={i} data-day={i} onClick={() => setSelectedDay(i)}
                  className={`flex-shrink-0 flex flex-col items-center px-3.5 py-2 rounded-2xl transition-all ${
                    sel     ? 'bg-orange-500 text-white shadow-md' :
                    isToday ? 'bg-orange-50 border-2 border-orange-300 text-orange-600' :
                              'bg-white border border-gray-200 text-gray-600'
                  }`}>
                  <span className="text-[10px] font-medium opacity-70">{i+1}일</span>
                  <span className={`text-sm font-black ${!sel && (isSat ? 'text-blue-500' : isSun ? 'text-red-500' : '')}`}>
                    {WEEK_DAYS[dow]}
                  </span>
                </button>
              );
            })}
          </div>

          {/* 선택된 날의 식단 카드 */}
          <div className="space-y-3">
            {MEAL_TYPES.map(mt => (
              <MobileMealCard key={mt.id}
                mealType={mt}
                meal={meal[mt.id]}
                hasChildren={hasChildren}
                ratings={ratings}
                onEditUnified={() => onEdit(selectedDay, mt.id, null)}
                onEditAdult={() => onEdit(selectedDay, mt.id, 'adult')}
                onEditChild={() => onEdit(selectedDay, mt.id, 'child')}
                onRate={onRate}
                onRecipe={onRecipe}
                onRegen={(mode) => onRegen(selectedDay, mt.id, mode)}
              />
            ))}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  설정 화면
    // ═══════════════════════════════════════════════════
    function SetupScreen({ onComplete, restore, onHelp }) {
      const [step, setStep]         = useState(1);
      const [members, setMembers]   = useState([
        { type:'adult', gender:'male',   age:35 },
        { type:'adult', gender:'female', age:33 },
      ]);
      const [period, setPeriod]     = useState(7);
      const [custom, setCustom]     = useState('');
      const [cuisines, setCuisines]   = useState(['korean']);
      const [noSpicy, setNoSpicy]     = useState(false);
      const [allergens, setAllergens] = useState([]);
      const [restoreData, setRestoreData] = useState(restore || null);

      const finalPeriod = custom !== '' ? (parseInt(custom)||7) : period;
      const stepLabels  = ['가족 구성원','식단 기간','요리 종류'];

      return (
        <div className="max-w-xl mx-auto p-4 py-10">
          {restoreData && (
            <RestorePrompt
              savedAt={restoreData.savedAt}
              onRestore={() => { setRestoreData(null); onComplete(restoreData.config, restoreData.mealPlan); }}
              onDismiss={() => setRestoreData(null)}
            />
          )}

          <div className="text-center mb-8 relative">
            <button onClick={onHelp}
              className="absolute top-0 right-0 w-8 h-8 rounded-full border border-gray-200 bg-white text-gray-400 text-sm font-bold hover:bg-orange-50 hover:border-orange-300 hover:text-orange-500 transition-all shadow-sm"
              title="사용 가이드">?</button>
            <div className="text-6xl mb-3 select-none">🍽️</div>
            <h1 className="text-3xl font-black text-gray-800">우리 가족 식단 플래너</h1>
            <p className="text-gray-500 mt-2 text-sm">맞춤형 식단으로 건강한 한 주를 시작해요</p>
          </div>

          <div className="flex items-center justify-center gap-1.5 mb-8">
            {stepLabels.map((lbl, i) => {
              const s = i + 1, done = s < step, active = s === step;
              return (
                <React.Fragment key={s}>
                  <div className="flex flex-col items-center">
                    <div className={`w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold transition-all shadow-sm ${done ? 'bg-green-500 text-white' : active ? 'bg-orange-500 text-white shadow-orange-200 shadow-lg' : 'bg-gray-200 text-gray-400'}`}>
                      {done ? '✓' : s}
                    </div>
                    <span className={`text-xs mt-1 font-medium ${active ? 'text-orange-600' : 'text-gray-400'}`}>{lbl}</span>
                  </div>
                  {i < 2 && <div className={`w-12 h-0.5 mb-5 rounded ${done ? 'bg-green-400' : 'bg-gray-200'}`} />}
                </React.Fragment>
              );
            })}
          </div>

          <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-6">
            {step === 1 && <StepFamily members={members} setMembers={setMembers} />}
            {step === 2 && <StepPeriod period={period} setPeriod={setPeriod} custom={custom} setCustom={setCustom} />}
            {step === 3 && <StepCuisine cuisines={cuisines} setCuisines={setCuisines} noSpicy={noSpicy} setNoSpicy={setNoSpicy} allergens={allergens} setAllergens={setAllergens} />}

            <div className="flex justify-between mt-8">
              <button onClick={() => setStep(s => s-1)} disabled={step===1}
                className="px-5 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-medium disabled:opacity-30 hover:bg-gray-50 transition-all">
                ← 이전
              </button>
              {step < 3 ? (
                <button onClick={() => setStep(s => s+1)}
                  className="px-6 py-2.5 rounded-xl bg-orange-500 text-white font-bold hover:bg-orange-600 transition-all shadow-md shadow-orange-200">
                  다음 →
                </button>
              ) : (
                <button onClick={() => onComplete({ members, period: finalPeriod, cuisines, noSpicy, allergens })}
                  className="px-6 py-2.5 rounded-xl bg-gradient-to-r from-orange-500 to-rose-500 text-white font-bold hover:from-orange-600 hover:to-rose-600 transition-all shadow-md shadow-orange-200">
                  식단 생성 🎉
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  식단표 화면
    // ═══════════════════════════════════════════════════
    function PlanScreen({ config, mealPlan, setMealPlan, savedAt, onBack, onRegen, onImport, customMeals = [], onAddCustomMeal, onDeleteCustomMeal, ratings = {}, onRate, templates = [], onSaveTemplate, onLoadTemplate, onDeleteTemplate, onHelp }) {
      const [week, setWeek]             = useState(0);
      const [editTarget, setEdit]       = useState(null);
      const [copied, setCopied]         = useState(false);
      const [showStats, setShowStats]   = useState(false);
      const [showCustomDB, setShowCustomDB]     = useState(false);
      const [showShopping, setShowShopping]     = useState(false);
      const [showTemplate, setShowTemplate]     = useState(false);
      const [recipeMeal, setRecipeMeal]         = useState(null);
      const fileInputRef = React.useRef(null);
      const allergens = config?.allergens || [];

      const totalWeeks  = Math.ceil(config.period / 7);
      const weekStart   = week * 7;
      const weekEnd     = Math.min(weekStart + 7, config.period);
      const daysInWeek  = weekEnd - weekStart;
      const minAge      = getMinAge(config.members);
      const children    = hasKids(config.members);
      const todayDow    = new Date().getDay();
      const todayIdx    = todayDow === 0 ? 6 : todayDow - 1;

      const saveMeal = ({ name, cuisine, note }) => {
        const { day, mt, who } = editTarget;
        setMealPlan(prev => {
          const dayPlan = { ...prev[day] };
          if (who) {
            // 분리 모드: adult 또는 child만 업데이트
            dayPlan[mt] = { ...(dayPlan[mt] || {}), [who]: { name, cuisine, note } };
          } else {
            dayPlan[mt] = { name, cuisine, note };
          }
          return { ...prev, [day]: dayPlan };
        });
        setEdit(null);
      };

      const regenOne = (day, mt, mode) => {
        if (mode === 'both') {
          const adultCur = mealPlan[day]?.[mt]?.adult?.name;
          const childCur = mealPlan[day]?.[mt]?.child?.name;
          const cAdult = pickOneMeal(mt, config.cuisines, 99,    adultCur, config.noSpicy, customMeals, ratings, allergens);
          const childNoSpicy = minAge <= 6 || config.noSpicy;
          const cChild = pickOneMeal(mt, config.cuisines, minAge, childCur, childNoSpicy, customMeals, ratings, allergens);
          setMealPlan(prev => ({
            ...prev,
            [day]: {
              ...prev[day],
              [mt]: {
                adult: cAdult ? { name: cAdult.name, cuisine: cAdult.cuisine } : prev[day]?.[mt]?.adult,
                child: cChild ? { name: cChild.name, cuisine: cChild.cuisine } : prev[day]?.[mt]?.child,
              }
            }
          }));
        } else {
          const current = mealPlan[day]?.[mt]?.name;
          const chosen  = pickOneMeal(mt, config.cuisines, minAge, current, config.noSpicy, customMeals, ratings, allergens);
          if (!chosen) return;
          setMealPlan(prev => ({ ...prev, [day]: { ...prev[day], [mt]: { name: chosen.name, cuisine: chosen.cuisine } } }));
        }
      };

      const exportJSON = () => {
        const payload = JSON.stringify({ config, mealPlan, exportedAt: Date.now() }, null, 2);
        const blob = new Blob([payload], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `식단플래너_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const importJSON = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data?.config && data?.mealPlan) onImport(data.config, data.mealPlan);
            else alert('올바른 식단 플래너 백업 파일이 아닙니다.');
          } catch { alert('파일을 읽을 수 없습니다.'); }
          e.target.value = '';
        };
        reader.readAsText(file);
      };

      const exportText = () => {
        const lines = [`🍽️ 우리 가족 식단표 (${config.period}일)`];
        if (children) lines.push('📌 [성인] / [아이] 분리 식단\n');
        else lines.push('');
        for (let w = 0; w < totalWeeks; w++) {
          lines.push(`[${w+1}주차]`);
          const wStart = w * 7, wEnd = Math.min(wStart+7, config.period);
          for (const mt of MEAL_TYPES) {
            if (children) {
              const adultRow = [mt.label + '(성인)'];
              const childRow = [mt.label + '(아이) '];
              for (let d = wStart; d < wEnd; d++) {
                const slot = mealPlan[d]?.[mt.id];
                adultRow.push((slot?.adult?.name || '-').slice(0,10).padEnd(11));
                childRow.push((slot?.child?.name || '-').slice(0,10).padEnd(11));
              }
              lines.push(adultRow.join(' '));
              lines.push(childRow.join(' '));
            } else {
              const row = [mt.label.padEnd(6)];
              for (let d = wStart; d < wEnd; d++) {
                row.push((mealPlan[d]?.[mt.id]?.name || '-').slice(0,10).padEnd(11));
              }
              lines.push(row.join(' '));
            }
          }
          lines.push('');
        }
        navigator.clipboard.writeText(lines.join('\n')).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };

      return (
        <div className="max-w-5xl mx-auto p-3 py-6">
          {/* 인쇄 전용 제목 */}
          <div className="print-title">우리 가족 식단표 ({config.period}일 플랜)</div>

          {/* 상단 바 */}
          <div className="flex items-center justify-between mb-5 no-print flex-wrap gap-3">
            <div className="flex items-center gap-3">
              <button onClick={onBack} className="p-2 rounded-xl border border-gray-200 hover:bg-gray-50 text-gray-600 text-sm font-medium transition-all">← 설정</button>
              <div>
                <h1 className="text-lg font-black text-gray-800">우리 가족 식단표</h1>
                <p className="text-xs text-gray-400">
                  {config.members.length}인 가족 · {config.period}일 플랜 · {config.cuisines.map(c => CUISINE_INFO[c].label).join(' / ')}
                  {savedAt && <span className="ml-2 text-gray-300 hidden sm:inline">· 저장 {formatTime(savedAt)}</span>}
                </p>
              </div>
            </div>
            <div className="flex gap-1.5 flex-wrap items-center">
              <button onClick={() => setShowStats(s => !s)} title="통계"
                className={`px-2.5 py-2 rounded-xl border text-xs font-medium transition-all touch-target ${showStats ? 'bg-indigo-50 border-indigo-300 text-indigo-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                📊<span className="hidden sm:inline ml-1">통계</span>
              </button>
              <button onClick={() => setShowCustomDB(true)} title="내 메뉴"
                className={`px-2.5 py-2 rounded-xl border text-xs font-medium transition-all touch-target ${customMeals.length > 0 ? 'bg-yellow-50 border-yellow-300 text-yellow-700' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                ⭐<span className="hidden sm:inline ml-1">내 메뉴{customMeals.length > 0 ? ` (${customMeals.length})` : ''}</span>
              </button>
              <button onClick={() => setShowShopping(true)} title="장보기"
                className="px-2.5 py-2 rounded-xl border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-all touch-target">
                🛒<span className="hidden sm:inline ml-1">장보기</span>
              </button>
              <button onClick={() => setShowTemplate(true)} title="템플릿"
                className={`px-2.5 py-2 rounded-xl border text-xs font-medium transition-all touch-target ${templates.length > 0 ? 'bg-violet-50 border-violet-300 text-violet-700' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                📋<span className="hidden sm:inline ml-1">템플릿{templates.length > 0 ? ` (${templates.length})` : ''}</span>
              </button>
              <button onClick={onRegen} title="전체 재생성"
                className="px-2.5 py-2 rounded-xl border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-all touch-target">
                🔄<span className="hidden sm:inline ml-1">재생성</span>
              </button>
              <button onClick={exportText} title="텍스트 복사"
                className={`px-2.5 py-2 rounded-xl border text-xs font-medium transition-all touch-target ${copied ? 'bg-green-50 border-green-300 text-green-600' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                {copied ? '✓' : '📋'}<span className="hidden sm:inline ml-1">{copied ? '복사됨!' : '복사'}</span>
              </button>
              <button onClick={exportJSON} title="JSON 저장"
                className="hidden sm:flex px-2.5 py-2 rounded-xl border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-all">
                💾<span className="hidden sm:inline ml-1">백업</span>
              </button>
              <button onClick={() => fileInputRef.current?.click()} title="백업 불러오기"
                className="hidden sm:flex px-2.5 py-2 rounded-xl border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-all">
                📂<span className="hidden sm:inline ml-1">불러오기</span>
              </button>
              <input ref={fileInputRef} type="file" accept=".json" className="hidden" onChange={importJSON} />
              <button onClick={() => window.print()} title="인쇄"
                className="hidden sm:flex px-2.5 py-2 rounded-xl bg-gray-800 text-white text-xs font-medium hover:bg-gray-700 transition-all">
                🖨️<span className="hidden sm:inline ml-1">인쇄</span>
              </button>
              <button onClick={onHelp} title="사용 가이드"
                className="w-8 h-8 rounded-xl border border-gray-200 text-gray-500 text-sm font-bold hover:bg-orange-50 hover:border-orange-300 hover:text-orange-500 transition-all flex items-center justify-center touch-target">?</button>
            </div>
          </div>

          {/* 통계 패널 */}
          {showStats && <div className="mb-4"><StatsPanel mealPlan={mealPlan} period={config.period} hasChildren={children} /></div>}

          {/* ── 모바일: 날짜탭 + 하루 카드 뷰 ── */}
          {IS_TOUCH ? (
            <MobilePlanView
              mealPlan={mealPlan}
              config={config}
              hasChildren={children}
              ratings={ratings}
              onEdit={(day, mt, who) => setEdit({ day, mt, who })}
              onRate={onRate}
              onRecipe={(name, cuisine) => setRecipeMeal({ name, cuisine })}
              onRegen={regenOne}
            />
          ) : (
            <>
              {/* 주차 탭 (데스크탑) */}
              {totalWeeks > 1 && (
                <div className="flex gap-2 mb-4 overflow-x-auto pb-1 no-print">
                  {Array.from({length:totalWeeks}, (_,i) => (
                    <button key={i} onClick={() => setWeek(i)}
                      className={`flex-shrink-0 px-4 py-2 rounded-xl text-sm font-bold transition-all ${week===i ? 'bg-orange-500 text-white shadow-md' : 'bg-white border border-gray-200 text-gray-600 hover:border-orange-300'}`}>
                      {i+1}주차
                    </button>
                  ))}
                </div>
              )}

              {/* 식단 그리드 (데스크탑) */}
              <div className="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden print-wrap">
                <div className="week-scroll">
                  <div style={{display:'grid', gridTemplateColumns:`60px repeat(${daysInWeek}, minmax(90px,1fr))`}}>
                    <div className="p-3 bg-gradient-to-br from-gray-50 to-gray-100 border-b border-r border-gray-100" />
                    {Array.from({length:daysInWeek}, (_,i) => {
                      const di = weekStart + i;
                      const dow = di % 7;
                      const isSat = dow === 5, isSun = dow === 6, isToday = dow === todayIdx && week === 0;
                      return (
                        <div key={i} className={`p-3 text-center border-b border-l border-gray-100 transition-colors ${isToday ? 'today-col' : 'bg-gradient-to-b from-gray-50 to-white'}`}>
                          <div className={`text-[10px] font-medium ${isToday ? 'text-orange-400' : 'text-gray-400'}`}>{isToday ? '오늘' : `${di+1}일차`}</div>
                          <div className={`font-bold text-sm ${isSat ? 'text-blue-500' : isSun ? 'text-red-500' : isToday ? 'today-header font-black' : 'text-gray-700'}`}>{WEEK_DAYS[dow]}</div>
                        </div>
                      );
                    })}
                    {MEAL_TYPES.map(mt => (
                      <React.Fragment key={mt.id}>
                        <div className="p-2.5 flex flex-col items-center justify-center border-b border-r border-gray-100 bg-gradient-to-r from-gray-50 to-white">
                          <span className="text-xl">{mt.emoji}</span>
                          <span className="text-[10px] font-bold text-gray-500 mt-0.5">{mt.label}</span>
                        </div>
                        {Array.from({length:daysInWeek}, (_,i) => {
                          const di = weekStart + i;
                          const dow = di % 7;
                          const isToday = dow === todayIdx && week === 0;
                          const meal = mealPlan[di]?.[mt.id];
                          return (
                            <div key={i} className={`p-1.5 border-b border-l border-gray-100 ${isToday ? 'today-col' : ''}`}>
                              <MealCell
                                meal={meal}
                                hasChildren={children}
                                onClick={children ? undefined : () => setEdit({ day:di, mt:mt.id, who:null })}
                                onClickAdult={children ? () => setEdit({ day:di, mt:mt.id, who:'adult' }) : undefined}
                                onClickChild={children ? () => setEdit({ day:di, mt:mt.id, who:'child' }) : undefined}
                                onRegen={(mode) => regenOne(di, mt.id, mode)}
                                onRate={onRate}
                                onRecipe={(name, cuisine) => setRecipeMeal({ name, cuisine })}
                                ratings={ratings}
                              />
                            </div>
                          );
                        })}
                      </React.Fragment>
                    ))}
                  </div>
                </div>
              </div>

              {/* 범례 */}
              <div className="mt-4 flex flex-wrap items-center gap-2 no-print">
                {config.cuisines.map(c => (
                  <span key={c} className={`px-3 py-1 rounded-full text-xs font-medium border ${CUISINE_INFO[c].badge} ${CUISINE_INFO[c].border}`}>
                    {CUISINE_INFO[c].emoji} {CUISINE_INFO[c].label}
                  </span>
                ))}
                <span className="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">✏️ 직접입력</span>
                <span className="text-xs text-gray-400 ml-auto">🎲 셀 호버 시 개별 재생성 · 클릭 시 메뉴 변경</span>
              </div>
            </>
          )}

          {/* 가족 요약 */}
          <div className="mt-3 flex flex-wrap gap-2 no-print">
            {config.members.map((m, i) => (
              <div key={i} className="flex items-center gap-1.5 px-3 py-1.5 bg-white rounded-full border border-gray-200 text-xs text-gray-600">
                <span>{m.type==='child' ? '🧒' : m.gender==='male' ? '👨' : '👩'}</span>
                <span>{m.type==='adult' ? '성인' : '자녀'} · {m.age}세</span>
              </div>
            ))}
          </div>

          {/* 편집 모달 */}
          {editTarget && (
            <EditModal
              dayIdx={editTarget.day}
              mealType={editTarget.mt}
              meal={
                editTarget.who
                  ? mealPlan[editTarget.day]?.[editTarget.mt]?.[editTarget.who]
                  : mealPlan[editTarget.day]?.[editTarget.mt]
              }
              config={config}
              minAge={minAge}
              who={editTarget.who}
              onSave={saveMeal}
              onClose={() => setEdit(null)}
              customMeals={customMeals}
              onAddCustomMeal={onAddCustomMeal}
            />
          )}

          {/* 내 메뉴 DB 모달 */}
          {showCustomDB && (
            <CustomMealsModal
              customMeals={customMeals}
              onAdd={onAddCustomMeal}
              onDelete={onDeleteCustomMeal}
              onClose={() => setShowCustomDB(false)}
            />
          )}

          {/* 템플릿 모달 */}
          {showTemplate && (
            <TemplateModal
              templates={templates}
              currentConfig={config}
              currentPlan={mealPlan}
              onSave={({ name }) => onSaveTemplate(name, config, mealPlan)}
              onLoad={(t) => onLoadTemplate(t)}
              onDelete={onDeleteTemplate}
              onClose={() => setShowTemplate(false)}
            />
          )}

          {/* 장보기 목록 모달 */}
          {showShopping && (
            <ShoppingListModal
              mealPlan={mealPlan}
              period={config.period}
              hasChildren={children}
              onClose={() => setShowShopping(false)}
            />
          )}

          {/* 레시피 검색 모달 */}
          {recipeMeal && (
            <RecipeModal
              mealName={recipeMeal.name}
              cuisine={recipeMeal.cuisine}
              onClose={() => setRecipeMeal(null)}
            />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════
    //  최상위 App
    // ═══════════════════════════════════════════════════
    function App() {
      const [screen, setScreen]         = useState('setup');
      const [config, setConfig]         = useState(null);
      const [mealPlan, setMealPlan]     = useState({});
      const [savedAt, setSavedAt]       = useState(null);
      const [restore, setRestore]       = useState(null);
      const [customMeals, setCustomMeals] = useState([]);
      const [ratings, setRatings]         = useState({});
      const [templates, setTemplates]     = useState([]);
      const [showHelp, setShowHelp]       = useState(false);

      const openHelp  = useCallback(() => setShowHelp(true), []);
      const closeHelp = useCallback(() => {
        try { localStorage.setItem('fmp_help_seen', '1'); } catch(e) {}
        setShowHelp(false);
      }, []);

      // 시작 시 localStorage 확인
      useEffect(() => {
        try {
          const raw = localStorage.getItem(SAVE_KEY);
          if (raw) {
            const data = JSON.parse(raw);
            if (data?.config && data?.mealPlan) setRestore(data);
          }
        } catch(e) {}
        try {
          const cm = localStorage.getItem(CUSTOM_KEY);
          if (cm) setCustomMeals(JSON.parse(cm) || []);
        } catch(e) {}
        try {
          const rt = localStorage.getItem(RATING_KEY);
          if (rt) setRatings(JSON.parse(rt) || {});
        } catch(e) {}
        try {
          const tp = localStorage.getItem(TEMPLATE_KEY);
          if (tp) setTemplates(JSON.parse(tp) || []);
        } catch(e) {}
        // 첫 방문 시 가이드 자동 표시
        try {
          if (!localStorage.getItem('fmp_help_seen')) setShowHelp(true);
        } catch(e) {}
      }, []);

      // 식단 변경 시 자동 저장
      useEffect(() => {
        if (screen === 'plan' && config && Object.keys(mealPlan).length > 0) {
          const ts = Date.now();
          try {
            localStorage.setItem(SAVE_KEY, JSON.stringify({ config, mealPlan, savedAt: ts }));
            setSavedAt(ts);
          } catch(e) {}
        }
      }, [mealPlan, screen, config]);

      const handleComplete = useCallback((cfgOrConfig, existingPlan) => {
        setConfig(cfgOrConfig);
        if (existingPlan) {
          setMealPlan(existingPlan);
        } else {
          const minAge    = getMinAge(cfgOrConfig.members);
          const children  = hasKids(cfgOrConfig.members);
          setMealPlan(generatePlan(cfgOrConfig.period, cfgOrConfig.cuisines, minAge, cfgOrConfig.noSpicy, children, customMeals, ratings, cfgOrConfig.allergens || []));
        }
        setScreen('plan');
      }, [customMeals, ratings]);

      const handleRegen = useCallback(() => {
        if (!config) return;
        const minAge   = getMinAge(config.members);
        const children = hasKids(config.members);
        setMealPlan(generatePlan(config.period, config.cuisines, minAge, config.noSpicy, children, customMeals, ratings, config.allergens || []));
      }, [config, customMeals, ratings]);

      const saveTemplate = useCallback((name, cfg, plan) => {
        setTemplates(prev => {
          const next = [...prev, { id: Date.now().toString(), name, config: cfg, mealPlan: plan, savedAt: Date.now() }];
          try { localStorage.setItem(TEMPLATE_KEY, JSON.stringify(next)); } catch(e) {}
          return next;
        });
      }, []);

      const loadTemplate = useCallback((t) => {
        setConfig(t.config);
        setMealPlan(t.mealPlan);
        setScreen('plan');
      }, []);

      const deleteTemplate = useCallback((id) => {
        setTemplates(prev => {
          const next = prev.filter(t => t.id !== id);
          try { localStorage.setItem(TEMPLATE_KEY, JSON.stringify(next)); } catch(e) {}
          return next;
        });
      }, []);

      const handleRate = useCallback((mealName, type) => {
        setRatings(prev => {
          const r = prev[mealName] || { likes: 0, dislikes: 0 };
          const next = {
            ...prev,
            [mealName]: {
              likes:    type === 'like'    ? r.likes + 1    : r.likes,
              dislikes: type === 'dislike' ? r.dislikes + 1 : r.dislikes,
            },
          };
          try { localStorage.setItem(RATING_KEY, JSON.stringify(next)); } catch(e) {}
          return next;
        });
      }, []);

      const handleImport = useCallback((cfg, plan) => {
        setConfig(cfg);
        setMealPlan(plan);
      }, []);

      const addCustomMeal = useCallback((meal) => {
        setCustomMeals(prev => {
          const next = [...prev, meal];
          try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(next)); } catch(e) {}
          return next;
        });
      }, []);

      const deleteCustomMeal = useCallback((id) => {
        setCustomMeals(prev => {
          const next = prev.filter(m => m.id !== id);
          try { localStorage.setItem(CUSTOM_KEY, JSON.stringify(next)); } catch(e) {}
          return next;
        });
      }, []);

      if (screen === 'plan') {
        return (
          <>
            <PlanScreen
              config={config}
              mealPlan={mealPlan}
              setMealPlan={setMealPlan}
              savedAt={savedAt}
              onBack={() => setScreen('setup')}
              onRegen={handleRegen}
              onImport={handleImport}
              customMeals={customMeals}
              onAddCustomMeal={addCustomMeal}
              onDeleteCustomMeal={deleteCustomMeal}
              ratings={ratings}
              onRate={handleRate}
              templates={templates}
              onSaveTemplate={saveTemplate}
              onLoadTemplate={loadTemplate}
              onDeleteTemplate={deleteTemplate}
              onHelp={openHelp}
            />
            {showHelp && <HelpModal onClose={closeHelp} />}
          </>
        );
      }
      return (
        <>
          <SetupScreen onComplete={handleComplete} restore={restore} onHelp={openHelp} />
          {showHelp && <HelpModal onClose={closeHelp} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js').catch(function() {});
      });
    }
  </script>

  <script>
    // iframe 임베드 시 부모 페이지에 높이 전달 (티스토리 등)
    (function() {
      if (window.parent === window) return;
      function sendHeight() {
        var h = document.getElementById('root')?.scrollHeight || document.body.scrollHeight;
        window.parent.postMessage({ type: 'fmp-resize', height: h + 32 }, '*');
      }
      if (typeof ResizeObserver !== 'undefined') {
        var ro = new ResizeObserver(sendHeight);
        ro.observe(document.getElementById('root') || document.body);
      }
      window.addEventListener('load', sendHeight);
    })();
  </script>
</body>
</html>
