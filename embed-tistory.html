<!-- ① 스타일 -->
<style>
#fmp-wrap {
  width: 100%;
  max-width: 860px;
  margin: 16px auto 24px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  border: 1px solid #f0f0f0;
  background: #fff8f4;
}
#fmp-frame {
  display: block;
  border: none;
  width: 100%;
  height: 820px;
  min-height: 600px;
}
#fmp-open-btn {
  display: block;
  width: fit-content;
  margin: 0 auto 28px;
  padding: 11px 28px;
  background: #f97316;
  color: #fff;
  border-radius: 999px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  box-shadow: 0 3px 12px rgba(249,115,22,0.35);
  text-align: center;
}
@media (max-width: 600px) {
  #fmp-frame { height: 680px; }
  #fmp-wrap  { border-radius: 12px; margin: 8px auto 16px; }
}
</style>

<!-- ② iframe -->
<div id="fmp-wrap">
  <iframe
    id="fmp-frame"
    src="https://peterpark3832.github.io/Family-meal-planner/"
    allow="clipboard-write; clipboard-read"
    title="우리 가족 식단 플래너"
    loading="lazy"
    scrolling="auto"
    frameborder="0"
  ></iframe>
</div>

<!-- ③ 새 탭 열기 버튼 -->
<a id="fmp-open-btn"
  href="https://peterpark3832.github.io/Family-meal-planner/"
  target="_blank"
  rel="noopener noreferrer">
  🍽️ 새 탭에서 크게 열기 →
</a>

<!-- ④ 높이 자동 조정 (앱에서 postMessage로 전달) -->
<script>
(function () {
  var frame = document.getElementById('fmp-frame');
  if (!frame) return;
  window.addEventListener('message', function (e) {
    if (e.data && e.data.type === 'fmp-resize' && typeof e.data.height === 'number') {
      var h = Math.max(580, Math.min(e.data.height, 2800));
      frame.style.height = h + 'px';
    }
  });
})();
</script>
